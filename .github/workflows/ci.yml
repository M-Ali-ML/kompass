name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend unit/integration tests (pytest). Runs in parallel with `frontend`.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # The agent never runs against a real model in tests, but app.config
      # requires this to be set in order to import.
      GOOGLE_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (with Python)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        # `python -m pytest` puts the backend root on sys.path so `app` imports.
        run: uv run python -m pytest -q

  # ---------------------------------------------------------------------------
  # Frontend lint + unit tests (vitest). Fast, browser-free feedback that runs
  # in parallel with the heavier E2E and backend jobs.
  # ---------------------------------------------------------------------------
  frontend-unit:
    name: Frontend (lint + unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

  # ---------------------------------------------------------------------------
  # Frontend end-to-end tests (Playwright). Boots its own backend + frontend
  # via playwright.config.js webServers. Runs in parallel with `backend`.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Playwright E2E)
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (with Python)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install backend dependencies (creates backend/.venv used by E2E)
        working-directory: backend
        run: uv sync --frozen

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
